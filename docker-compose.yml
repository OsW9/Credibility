
services:
  platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credibility_hub_platform
    ports:
      - "4321:80"
    restart: always
    environment:
      - NODE_ENV=production

  # Optional: Dev environment for rapid iteration
  platform-dev:
    image: node:20-slim
    container_name: credibility_hub_dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
