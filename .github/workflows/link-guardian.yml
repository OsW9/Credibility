name: "Link Guardian"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'platform/package-lock.json'

      - name: Install dependencies
 la l'installation des dépendances
        run: |
          cd platform
          npm install node-fetch gray-matter

      - name: Run Link Guardian
        run: |
          cd platform
          node scripts/link-guardian.mjs
